<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foot Locker - Jeu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="image" href="./background.png">
</head>
<body>
    <div class="main-wrapper">
        <header class="header">
            <img src="./logo.png" alt="Foot Locker" class="logo">

        <main class="content-area">
            <h1 class="title">REGLES DU JEU</h1>
            <p class="subtitle">comment jouer !</p>

            <div class="info-block">

                    <li>100pts</li>
                    <li>200pts</li>
                    <li>500pts</li>

            <div class="info-block">
                <h2 class="section-label">Tentatives</h2>

            </div>
        </main>

        <footer class="footer">
            <button class="play-button">J'ai compris, Jouer ?</button>
        </footer>
        <a href="page3.html" class="btn-play">J'ai compris, jouer ?</a>
