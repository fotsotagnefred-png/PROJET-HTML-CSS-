<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Foot Locker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-screen">
        
        <div class="content">
            <img src="./logo.png" alt="Foot Locker" class="logo">
            
            <h1 class="message">FÉLICITATIONS !</h1>
            <h2 class="points">+ 500 POINTS</h2>
            
            <div class="stats">
                <p>Score total : 2000 points</p>
                <p>Il vous reste 1 tentative</p>
            </div>

            <div class="buttons-container">
                <button class="btn-rejouer">REJOUER</button>
                <button class="btn-classement">CLASSEMENT</button>
            </div>
        </div>

    </div>

</body>
</html>
