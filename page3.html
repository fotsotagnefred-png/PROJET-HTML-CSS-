<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Foot Locker - Jeu</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preload" as="image" href="./background.png">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <img src="./logo.png" alt="Foot Locker Logo" class="logo">
        </div>

        <h1>CRÉE TON COMPTE POUR JOUER !</h1>
        <p class="subtitle">Tentez de gagner une belle réduction sur un article de la nouvelle collection footlocker de votre choix.</p>

        <form id="registration-form">
            <div class="input-group">
                <label>Nom et prénom :</label>
                <input type="text" placeholder="Entrer votre nom et prénom" required>
            </div>

            <div class="input-group">
                <label>Email :</label>
                <input type="email" placeholder="Entrer votre adresse email" required>
            </div>

            <div class="input-group">
                <label>Nom votre numéro :</label>
                <input type="tel" placeholder="Entrer votre numéro" required>
            </div>

            <button type="submit" class="btn-participer">PARTICIPER</button>
        </form>
    </div>
</body>
</html>
