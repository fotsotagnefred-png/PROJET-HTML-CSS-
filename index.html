<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Foot Locker - Roue Chanceuse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <img src="image/logo.png" alt="Foot Locker" class="main-logo">

        <div class="text-content">
            <h1>Roue<br>chanceuse</h1>
            <p>Tentez votre chance et gagnez !</p>
        </div>

        <div class="form-container">
            <input type="email" placeholder="Entrez votre Mail" class="input-mail">
            <button type="button" class="btn-play">COMMENCER A JOUER</button>
        </div>

        <a href="#" class="help-link">Comment jouer ?</a>
    </div>
</body>
</html>
